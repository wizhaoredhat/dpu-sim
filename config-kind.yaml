# DPU Simulator Configuration - Kind (Container) Mode
#
# This configuration uses Kind (Kubernetes in Docker) instead of VMs
# for faster iteration and development.
#
# To use this config:
#   python3 dpu-sim.py --config config-kind.yaml
#
# Prerequisites:
#   - Docker installed and running
#   - Kind installed (go install sigs.k8s.io/kind@latest)
#   - kubectl installed
#   - Helm installed (for OVN-Kubernetes)

# Kind cluster configuration
# This replaces the 'vms' section when using container mode
kind:
  nodes:
    - role: control-plane
      # Optional: expose ports on the host
      # extra_port_mappings:
      #   - container_port: 30000
      #     host_port: 30000
      #     protocol: TCP
    - role: worker
    - role: worker

# Kubernetes cluster configuration
kubernetes:
  version: "1.33"
  clusters:
    - name: "dpu-sim-kind"
      pod_cidr: "10.244.0.0/16"
      service_cidr: "10.96.0.0/16"
      cni: "kindnet"

