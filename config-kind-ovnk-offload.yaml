# DPU Simulator Configuration - Kind (Container) Mode
#
# This configuration uses Kind (Kubernetes in Docker) with two clusters
# (host and DPU), similar to the VM approach.
#
# To use this config:
#   python3 dpu-sim.py --config config-kind.yaml

networks:
  - name: "host-to-dpu-link"
    type: "HostToDpu"
    num_pairs: 16

# Kind cluster configuration: one Kind cluster per kubernetes.clusters entry.
# Node "name" is applied as a label (dpu-sim.org/node-name); Kind does not support node renaming.
kind:
  nodes:
    - name: "control-plane-host"
      k8s_role: "control-plane"
      k8s_cluster: "dpu-sim-host"
    - name: "control-plane-dpu"
      k8s_role: "control-plane"
      k8s_cluster: "dpu-sim-dpu"
    - name: "host-1-1"
      type: host
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-host"
    - name: "dpu-1-1"
      type: dpu
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-dpu"
      host: "host-1-1"
    - name: "host-2-1"
      type: host
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-host"
    - name: "dpu-2-1"
      type: dpu
      k8s_role: "worker"
      k8s_cluster: "dpu-sim-dpu"
      host: "host-2-1"

kubernetes:
  version: "1.33"
  offload_dpu: true
  clusters:
    - name: "dpu-sim-host"
      pod_cidr: "10.244.0.0/16"
      service_cidr: "10.245.0.0/16"
      cni: "ovn-kubernetes"
      addons:
        - multus

    - name: "dpu-sim-dpu"
      pod_cidr: "10.246.0.0/16"
      service_cidr: "10.247.0.0/16"
      cni: "flannel"
      addons:
        - multus

registry:
  enabled: false
  containers:
    - name: "ovn-kube"
      cni: "ovn-kubernetes"
      tag: "ovn-kube:dpu-sim"


tft:
  - name: "Test 1"
    namespace: "default"
    test_cases: "1-24"
    duration: "10"
    pre_provision: "true"
    connections:
      - name: "Connection_1"
        type: "iperf-tcp"
        instances: 1
        server:
          - name: "dpu-sim-host-worker"
            persistent: "false"
            sriov: "true"
            default_network: "default/ovn-primary"
        client:
          - name: "dpu-sim-host-worker2"
            sriov: "true"
            default_network: "default/ovn-primary"
        resource_name: "dpusim.io/vf"
kubeconfig: "kubeconfig/dpu-sim-host.kubeconfig"
